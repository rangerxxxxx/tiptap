<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#8fdff0" />
    <title>星光池塘</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="game-shell" data-theme="day">
      <section class="pond" aria-label="星光池塘点击游戏">
        <div class="sky-layer" aria-hidden="true">
          <div class="sun-moon"></div>
          <div class="cloud cloud-a"></div>
          <div class="cloud cloud-b"></div>
          <div class="dusk-glow"></div>
        </div>

        <header class="hud">
          <div class="level-pill" aria-live="polite">
            <span class="level-dot"></span>
            <span id="levelLabel">第1关</span>
          </div>
          <div class="progress-wrap" aria-label="关卡进度">
            <div id="progressBar" class="progress-bar"></div>
          </div>
          <button id="musicButton" class="icon-button" type="button" aria-label="关闭音乐">
            <span class="music-icon"></span>
          </button>
          <button id="themeButton" class="icon-button" type="button" aria-label="切换昼夜">
            <span class="theme-icon"></span>
          </button>
          <button id="pauseButton" class="icon-button" type="button" aria-label="暂停">
            <span class="pause-icon"></span>
          </button>
        </header>

        <div id="playField" class="play-field" aria-label="点击发光泡泡">
          <div class="ripple ripple-a"></div>
          <div class="ripple ripple-b"></div>
          <div class="ripple ripple-c"></div>
          <div class="lily lily-a"></div>
          <div class="lily lily-b"></div>
        </div>

        <footer class="reward-dock" aria-label="奖励">
          <div id="medals" class="medals"></div>
          <div class="rest-chip">
            <span class="rest-icon"></span>
            <span id="restLabel">休息 3:00</span>
          </div>
        </footer>
      </section>

      <div id="rewardOverlay" class="overlay reward-overlay" hidden>
        <div class="award-scene" role="status" aria-live="assertive">
          <div class="award-rays"></div>
          <div class="award-medal"></div>
          <h1 id="rewardTitle">真棒</h1>
          <p id="rewardText">获得一枚星光奖章</p>
          <button id="nextLevelButton" class="primary-button" type="button">下一关</button>
        </div>
      </div>

      <div id="restOverlay" class="overlay rest-overlay" hidden>
        <div class="rest-scene" role="status" aria-live="assertive">
          <div class="sleepy-moon"></div>
          <h1>休息一下</h1>
          <p>看看远处，眨眨眼睛</p>
          <div id="restCountdown" class="rest-countdown">30</div>
        </div>
      </div>

      <div id="startOverlay" class="overlay start-overlay">
        <div class="start-scene">
          <div class="brand-mark">
            <span></span>
          </div>
          <h1>星光池塘</h1>
          <p>点一点，听声音，看光光</p>
          <button id="startButton" class="primary-button" type="button">开始玩</button>
        </div>
      </div>
    </main>

    <script src="game.js"></script>
  </body>
</html>
